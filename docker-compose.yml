services:

  postgres:
    image: postgres:17
    container_name: finalspace-postgres
    restart: unless-stopped

    environment:
      POSTGRES_DB: ${POSTGRES_DB:-finalspace}
      POSTGRES_USER: ${POSTGRES_USER:-finalspace}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-finalspace}

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    networks:
      - finalspace-network

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10


  mongodb:
    image: mongo:7
    container_name: finalspace-mongodb
    restart: unless-stopped

    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME:-finalspace}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD:-finalspace}
      MONGO_INITDB_DATABASE: ${MONGO_DATABASE:-finalspace}

    ports:
      - "27017:27017"

    volumes:
      - mongodb_data:/data/db

    networks:
      - finalspace-network

    healthcheck:
      test: ["CMD-SHELL", "mongosh --username $${MONGO_INITDB_ROOT_USERNAME} --password $${MONGO_INITDB_ROOT_PASSWORD} --authenticationDatabase admin --eval 'db.adminCommand({ ping: 1 })'"]
      interval: 10s
      timeout: 5s
      retries: 10


  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile

    image: finalspace-backend:local
    container_name: finalspace-backend
    restart: unless-stopped

    environment:
      SERVER_PORT: 8080

      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-finalspace}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-finalspace}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-finalspace}

      SPRING_DATA_MONGODB_URI: mongodb://${MONGO_INITDB_ROOT_USERNAME:-finalspace}:${MONGO_INITDB_ROOT_PASSWORD:-finalspace}@mongodb:27017/${MONGO_DATABASE:-finalspace}?authSource=admin

      SPRING_JPA_HIBERNATE_DDL_AUTO: ${SPRING_JPA_HIBERNATE_DDL_AUTO:-update}
      SPRING_JPA_SHOW_SQL: ${SPRING_JPA_SHOW_SQL:-false}

      JWT_SECRET: ${JWT_SECRET:-finalspace-secret-key-finalspace-secret-key-change-me}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-86400000}

      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost,http://localhost:4200,http://localhost:8080}

    ports:
      - "${BACKEND_PORT:-8080}:8080"

    depends_on:
      postgres:
        condition: service_healthy
      mongodb:
        condition: service_healthy

    networks:
      - finalspace-network


  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile

    image: finalspace-frontend:local
    container_name: finalspace-frontend
    restart: unless-stopped

    ports:
      - "${FRONTEND_PORT:-80}:80"

    depends_on:
      - backend

    networks:
      - finalspace-network


volumes:
  postgres_data:
  mongodb_data:


networks:
  finalspace-network:
    driver: bridge