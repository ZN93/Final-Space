<div class="min-h-screen w-full bg-slate-950 flex items-center justify-center px-6">
    <div class="w-full max-w-md rounded-2xl border border-cyan-800 bg-teal-950/90 p-8 shadow-2xl">
        <h1 class="text-3xl font-bold text-amber-100">
            Final Space
        </h1>

        <p class="mt-3 text-sm text-cyan-100">
            Connectez-vous pour accéder à la plateforme.
        </p>

        <form class="mt-8 space-y-5" (ngSubmit)="onLogin()">
            <div>
                <label class="mb-2 block text-sm font-medium text-amber-100">
                    Email
                </label>

                <input
                        class="w-full rounded-lg border border-cyan-700 bg-slate-950 px-4 py-3 text-amber-100 outline-none focus:border-amber-400"
                        type="email"
                        [(ngModel)]="email"
                        name="email"
                        placeholder="admin@finalspace.com"
                />
            </div>

            <div>
                <label class="mb-2 block text-sm font-medium text-amber-100">
                    Mot de passe
                </label>

                <input
                        class="w-full rounded-lg border border-cyan-700 bg-slate-950 px-4 py-3 text-amber-100 outline-none focus:border-amber-400"
                        type="password"
                        [(ngModel)]="password"
                        name="password"
                        placeholder="••••••••"
                />
            </div>

            <p *ngIf="errorMessage" class="text-sm text-red-400">
                {{ errorMessage }}
            </p>

            <button
                    class="w-full rounded-lg bg-amber-500 px-4 py-3 font-semibold text-slate-950 hover:bg-orange-500"
                    type="submit"
            >
                Se connecter
            </button>
        </form>
    </div>
</div>
