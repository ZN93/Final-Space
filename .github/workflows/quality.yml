name: Quality - Tests and Sonar

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read
  pull-requests: read

jobs:
  quality:
    name: Tests, coverage and SonarQube Cloud
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.adminCommand({ ping: 1 })'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Allow Maven wrapper execution
        run: chmod +x backend/mvnw

      - name: Backend - tests and coverage
        working-directory: backend
        env:
          SPRING_DATA_MONGODB_URI: mongodb://localhost:27017/finalspace-test
          SPRING_MONGODB_URI: mongodb://localhost:27017/finalspace-test
        run: ./mvnw clean verify

      - name: Backend - copy dependencies for Sonar
        working-directory: backend
        run: ./mvnw dependency:copy-dependencies -DincludeScope=test -DskipTests

      - name: Frontend - install dependencies
        working-directory: frontend
        run: npm ci

      - name: Frontend - build
        working-directory: frontend
        run: npm run build

      - name: SonarQube Cloud scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}