# ===============================
# DATABASE - PostgreSQL
# ===============================
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/finalspace}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:finalspace}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:finalspace}
spring.datasource.driver-class-name=org.postgresql.Driver

# ===============================
# DATABASE - MongoDB
# ===============================
spring.mongodb.uri=${SPRING_DATA_MONGODB_URI:mongodb://finalspace:finalspace@localhost:27017/finalspace?authSource=admin}
spring.data.mongodb.uri=${SPRING_DATA_MONGODB_URI:mongodb://finalspace:finalspace@localhost:27017/finalspace?authSource=admin}

# ===============================
# JPA / HIBERNATE
# ===============================
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:true}
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ===============================
# JWT
# ===============================
jwt.secret=${JWT_SECRET:finalspace-secret-key-finalspace-secret-key}
jwt.expiration=${JWT_EXPIRATION:86400000}

# ===============================
# CORS
# ===============================
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:4200,http://localhost,http://localhost:8080}

# ===============================
# SERVER
# ===============================
server.port=${SERVER_PORT:8080}

# ===============================
# ACTUATOR
# ===============================
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never